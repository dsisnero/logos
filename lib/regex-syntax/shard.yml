name: regex-syntax
version: 0.5.0

authors:
  - Dominic Sisneros <dsisnero@gmail.com>

crystal: '>= 1.19.1'

license: MIT OR Apache-2.0

description: |
  A source-faithful regular expression parser for Crystal, ported from Rust's
  regex-syntax crate.

  This shard provides staged parsing into abstract syntax trees (AST) and
  high-level intermediate representations (HIR), structured parser and
  translator errors, Unicode property resolution, interval algebra, literal
  extraction, printers, visitors, and UTF-8 helpers.

repository: https://github.com/dsisnero/regex-syntax

dependencies:
  # Will depend on regex-automata for some functionality
  # regex-automata:
  #   github: dsisnero/regex-automata
  #   path: ../regex-automata

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
